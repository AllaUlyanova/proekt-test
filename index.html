<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Генератор идей для постов</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #0b1220;
        --text: #111827;
        --muted: #6b7280;
        --card: rgba(255, 255, 255, 0.86);
        --border: rgba(255, 255, 255, 0.55);
        --shadow: 0 24px 55px rgba(2, 6, 23, 0.28);
        --ring: 0 0 0 6px rgba(99, 102, 241, 0.15);
      }

      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto,
          Arial, "Noto Sans", "Liberation Sans", sans-serif;
        background: radial-gradient(
            1200px 600px at 15% 10%,
            rgba(99, 102, 241, 0.35),
            transparent 55%
          ),
          radial-gradient(
            900px 700px at 85% 20%,
            rgba(16, 185, 129, 0.22),
            transparent 60%
          ),
          radial-gradient(
            900px 650px at 50% 95%,
            rgba(236, 72, 153, 0.16),
            transparent 55%
          ),
          var(--bg);
        color: rgba(255, 255, 255, 0.92);
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      main {
        max-width: 820px;
        margin: 0 auto;
        padding: 72px 20px;
      }

      h1 {
        font-size: clamp(28px, 3.2vw, 44px);
        line-height: 1.12;
        margin: 0 0 12px;
        letter-spacing: -0.02em;
      }

      p {
        margin: 0 0 22px;
        color: rgba(255, 255, 255, 0.72);
        max-width: 58ch;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 22px 22px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(10px);
        transform: translateY(8px);
        opacity: 0;
        animation: rise-in 600ms cubic-bezier(0.2, 0.9, 0.2, 1) 90ms forwards;
        transition: transform 200ms ease, box-shadow 200ms ease, border-color 200ms ease;
      }

      .card:hover {
        transform: translateY(4px);
        border-color: rgba(255, 255, 255, 0.8);
        box-shadow: 0 30px 70px rgba(2, 6, 23, 0.34);
      }

      ul {
        margin: 0;
        padding-left: 0;
        list-style: none;
        display: grid;
        gap: 10px;
      }

      li {
        color: rgba(17, 24, 39, 0.92);
        background: rgba(255, 255, 255, 0.55);
        border: 1px solid rgba(15, 23, 42, 0.08);
        border-radius: 14px;
        padding: 12px 14px;
        line-height: 1.3;
        display: flex;
        align-items: center;
        gap: 10px;
        transition: transform 180ms ease, background 180ms ease, border-color 180ms ease;
      }

      li::before {
        content: "";
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: linear-gradient(135deg, #6366f1, #10b981);
        box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        flex: 0 0 auto;
      }

      li:hover {
        transform: translateY(-1px);
        background: rgba(255, 255, 255, 0.72);
        border-color: rgba(99, 102, 241, 0.25);
      }

      :focus-visible {
        outline: none;
        box-shadow: var(--ring);
        border-radius: 12px;
      }

      @keyframes rise-in {
        from {
          opacity: 0;
          transform: translateY(14px);
        }
        to {
          opacity: 1;
          transform: translateY(8px);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        * {
          animation: none !important;
          transition: none !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Генератор идей для постов</h1>
      <p>Выберите формат — и начинайте писать.</p>

      <section class="card" aria-label="Список вариантов">
        <ul>
          <li>5 идей постов для экспертов</li>
          <li>3 идеи сторис на сегодня</li>
          <li>контент план на неделю</li>
        </ul>
      </section>
    </main>
  </body>
</html>
