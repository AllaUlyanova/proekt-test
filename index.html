<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Генератор идей для постов</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #ffffff;
        --text: #111827;
        --muted: #6b7280;
        --card: #f9fafb;
        --border: #e5e7eb;
      }

      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto,
          Arial, "Noto Sans", "Liberation Sans", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      main {
        max-width: 820px;
        margin: 0 auto;
        padding: 48px 20px;
      }

      h1 {
        font-size: 32px;
        line-height: 1.2;
        margin: 0 0 10px;
      }

      p {
        margin: 0 0 22px;
        color: var(--muted);
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 18px 18px;
      }

      ul {
        margin: 0;
        padding-left: 22px;
      }

      li {
        padding: 6px 0;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Генератор идей для постов</h1>
      <p>Выберите формат — и начинайте писать.</p>

      <section class="card" aria-label="Список вариантов">
        <ul>
          <li>5 идей постов для экспертов</li>
          <li>3 идеи сторис на сегодня</li>
          <li>контент план на неделю</li>
        </ul>
      </section>
    </main>
  </body>
</html>
